{% extends 'base.html' %}

{% block title %}{{ post.heading }}{% endblock %}

{% block page_heading %}
    {{ post.heading }}
{% endblock %}

{% block content %}
<div class="meta">
    📅 {{ post.date }} &nbsp;&nbsp; ✍️ {{ post.author }} &nbsp;&nbsp; 💾 {{ post.category }}
</div>

<p class="content">
    {{ post.content | trim | replace('\n', '<br>') | safe }}
</p>
<img src="{{ post.image_url }}" alt="测试图片">
{% endblock %}
